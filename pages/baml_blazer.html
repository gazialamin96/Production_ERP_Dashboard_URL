<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="shortcut icon" href="./Amtranet_logo.jpeg" type="image/svg+xml">

    <script>
        const urls = [
            'http://erp.amtranet.com/production/reports/unit.php?url=Bravo%20Apparel%20Manufacturer%20Ltd./B.Blazer%20%5bSewing%5d/'
        ];

        let currentIndex = 0;

        function loadNextLink() {
            if (currentIndex < urls.length) {
                document.getElementById('contentFrame').src = urls[currentIndex];
                console.log(`Loaded: ${urls[currentIndex]}`);
                currentIndex++;
                if (currentIndex >= urls.length) {
                    currentIndex = 0;
                }
            }
        }

        window.onload = function() {
            loadNextLink();
            setInterval(loadNextLink, 900000);
        };

        //clock part start
        function clock() {
                const now = new Date();
                const options = {
                    timeZone: 'Asia/Dhaka',
                    hour: 'numeric',
                    minute: 'numeric',
                    second: 'numeric',
                    hour12: true
                };
                const timeString = new Intl.DateTimeFormat('en-US', options).format(now);
                document.getElementById('clock').textContent = timeString;
            }

            setInterval(clock, 1000);
            clock(); // Initial call to display the clock immediately
    </script>


</head>

<body>
    <div class="container">
        <h2>Bravo Apparel Manufacturer Limited</h2>
        <h1 id="clock"></h1>
    </div>
    <iframe id="contentFrame"></iframe>
</body>
</html>

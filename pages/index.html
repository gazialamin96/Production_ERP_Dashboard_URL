<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAML BLAZER</title>
    <link rel="shortcut icon" href="./Amtranet_logo.jpeg" type="image/svg+xml">
    <style>
        body, html {
            background-color: rgb(223, 254, 254);
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            height: 50px; /* Adjust the height as needed */
        }
        h1 {
            font-size: 3rem;
            position: absolute;
            right: 0;
            margin: 0;
        }
        h2 {
            margin: 0;
            font-size: 2rem;
            text-align: center;
            color: tomato;
        }
        h3 {
            font-size: 1rem;
            text-align: center;
            color: rgb(0, 0, 0);
        }
        p {
            font-size: 1.2rem;
        }
        #clock {
            font-size: 48px;
            font-weight: bold;
            color: red;
        }
        @media (min-width: 768px) {
            p {
                font-size: 1.5rem;
            }
        }
        @media (min-width: 1200px) {
            p {
                font-size: 2rem;
            }
        }
    </style>
    <script>
        const urls = [
            'http://erp.amtranet.com/production/reports/unit.php?url=Bravo%20Apparel%20Manufacturer%20Ltd./B.Blazer%20%5bSewing%5d/'
        ];

        let currentIndex = 0;

        function loadNextLink() {
            if (currentIndex < urls.length) {
                document.getElementById('contentFrame').src = urls[currentIndex];
                console.log(`Loaded: ${urls[currentIndex]}`);
                currentIndex++;
                if (currentIndex >= urls.length) {
                    currentIndex = 0;
                }
            }
        }

        window.onload = function() {
            loadNextLink();
            setInterval(loadNextLink, 900000);
        };

        function updateClock() {
            const now = new Date();
            const options = {
                timeZone: 'Asia/Dhaka',
                hour: 'numeric',
                minute: 'numeric',
                second: 'numeric',
                hour12: true
            };
            const timeString = new Intl.DateTimeFormat('en-US', options).format(now);
            document.getElementById('clock').textContent = timeString;
        }

        setInterval(updateClock, 1000);
        updateClock(); // Initial call to display the clock immediately
    </script>
</head>
<body>
    <div class="container">
        <h2>Bravo Apparel Manufacturer Limited</h2>
        <h1 id="clock"></h1>
    </div>
    <iframe id="contentFrame"></iframe>
</body>
</html>

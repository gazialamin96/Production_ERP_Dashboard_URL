<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE-edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amtranet Limited</title>
    <link rel="shortcut icon" href="./Amtranet_logo.jpeg" type="image/svg+xml">
    <!-- <script src="../script/javascript.js"></script> -->
    <link rel="stylesheet" href="../style/style.css">
    
    <script>
        const urls = [
            'http://203.202.247.83/production/reports/unit.php?url=Amtranet%20Limited/'
        ];

        let currentIndex = 0;

        function loadNextLink() {
            if (currentIndex < urls.length) {
                document.getElementById('contentFrame').src = urls[currentIndex];
                console.log(`Loaded: ${urls[currentIndex]}`);
                currentIndex++;
                if (currentIndex >= urls.length) {
                    currentIndex = 0;
                }
            }
        }

        window.onload = function() {
            loadNextLink();
            setInterval(loadNextLink, 120000);
        };
        //clock part start
        function clock() {
                const now = new Date();
                const options = {
                    timeZone: 'Asia/Dhaka',
                    hour: 'numeric',
                    minute: 'numeric',
                    second: 'numeric',
                    hour12: true
                };
                const timeString = new Intl.DateTimeFormat('en-US', options).format(now);
                document.getElementById('clock').textContent = timeString;
            }

            setInterval(clock, 1000);
            clock(); // Initial call to display the clock immediately
    </script>


</head>

<body>
    <div class="container">
        <div id="clock"></div>
        <h2>Amtranet Limited</h2>
    </div>
    
    <iframe id="contentFrame"></iframe>
    
</body>
</html>
